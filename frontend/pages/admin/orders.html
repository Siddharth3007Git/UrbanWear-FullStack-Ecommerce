<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>UrbanWear | My Orders</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/footer.css">

    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet"
          href="../assets/css/orders.css">

    <!-- API Config -->
    

</head>

<body>

    <!-- ==========================
            LOADER
    =========================== -->

    <div class="loader"
         id="loader">

        <div class="spinner"></div>

    </div>

    <!-- ==========================
            NAVBAR
    =========================== -->

    <nav class="navbar">

        <div class="logo">

            <a href="home.html">

                Urban<span>Wear</span>

            </a>

        </div>

        <ul>

            <li>

                <a href="home.html">

                    Home

                </a>

            </li>

            <li>

                <a href="products.html">

                    Products

                </a>

            </li>

            <li>

                <a href="cart.html">

                    Cart

                    <span id="cartCount">

                        0

                    </span>

                </a>

            </li>

            <li>

                <a href="orders.html"
                   class="active">

                    My Orders

                </a>

            </li>

        </ul>

        <button class="logout-btn"
                id="logoutBtn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </nav>

    <!-- ==========================
            PAGE HEADER
    =========================== -->

    <header class="page-header">

        <h1>

            <i class="fa-solid fa-box"></i>

            My Orders

        </h1>

        <p>

            Track, manage and view your previous purchases.

        </p>

    </header>

    <!-- ==========================
            SEARCH BAR
    =========================== -->

    <section class="search-section">

        <input
            type="text"
            id="searchOrder"
            placeholder="Search by Order ID, Product Name or Status">

        <button id="searchBtn">

            <i class="fa-solid fa-magnifying-glass"></i>

        </button>

    </section>
    <!-- ==========================
            ORDERS CONTAINER
    =========================== -->

    <main>

        <section
            class="orders-container"
            id="ordersContainer">

            <!-- Orders are loaded dynamically
                 from orders.js -->

        </section>

    </main>

    <!-- ==========================
            EMPTY ORDERS
    =========================== -->

    <section
        class="empty-orders"
        id="emptyOrders"
        style="display:none;">

        <i class="fa-solid fa-box-open"></i>

        <h2>

            No Orders Found

        </h2>

        <p>

            It looks like you haven't placed any
            orders yet.

            Browse our latest collections and
            place your first order today.

        </p>

        <a
            href="products.html"
            class="shop-btn">

            <i class="fa-solid fa-bag-shopping"></i>

            Shop Now

        </a>

    </section>

    <!-- ==========================
            TOAST NOTIFICATION
    =========================== -->

    <div
        class="toast"
        id="toast">

    </div>

    <!-- ==========================
            FOOTER
    =========================== -->

    <footer>

        <p>

            © 2026 UrbanWear.

            All Rights Reserved.

        </p>

    </footer>

    <!-- ==========================
            JAVASCRIPT
    =========================== -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/navbar.js"></script>


    <script src="../assets/js/orders.js"></script>

</body>

</html>
