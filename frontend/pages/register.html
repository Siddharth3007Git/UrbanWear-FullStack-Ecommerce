<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | UrbanWear</title>
        <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <!-- CSS -->
    
    <link rel="stylesheet" href="../assets/css/register.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="login-container">

        <!-- Left Panel -->

        <div class="login-left">

            <div class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 20L32 10L47 20V44L32 54L17 44V20Z" stroke="white" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M24 24H40" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <path d="M24 34H40" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <path d="M24 44H33" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>

            <h1>Create Account</h1>

            <p>
                Join UrbanWear and discover the latest fashion trends with a secure shopping experience.
            </p>

        </div>

        <!-- Right Panel -->

        <div class="login-right">

            <form id="registerForm" class="login-form">

                <h2>Register</h2>

                <div id="messageBox"></div>

                <!-- Full Name -->

                <div class="input-group">

                    <label for="name">Full Name</label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required>

                </div>

                <!-- Email -->

                <div class="input-group">

                    <label for="email">Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label for="password">Password</label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="password"
                            placeholder="Create a password"
                            required>

                        <button
                            type="button"
                            id="togglePassword"
                            class="toggle-btn">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Confirm Password -->

                <div class="input-group">

                    <label for="confirmPassword">Confirm Password</label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your password"
                            required>

                        <button
                            type="button"
                            id="toggleConfirmPassword"
                            class="toggle-btn">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Register Button -->

                <button
                    type="submit"
                    id="registerBtn"
                    class="login-btn">

                    Create Account

                </button>

                <!-- Loading -->

                <div
                    id="loading"
                    class="loading">

                    <i class="fa-solid fa-spinner fa-spin"></i>

                    Creating your account...

                </div>

                <!-- Login Link -->

                <p class="register-text">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </p>

            </form>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/register.js"></script>

</body>

</html>
