<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Successful | UrbanWear</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            font-family:Poppins,sans-serif;
        }

        .success-card{
            width:500px;
            max-width:95%;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        .icon{
            font-size:80px;
            color:#198754;
        }

        h2{
            margin-top:20px;
            font-weight:700;
        }

        .info-box{
            background:#f8f9fa;
            border-radius:12px;
            padding:15px;
            margin:25px 0;
            text-align:left;
        }

        .info-box p{
            margin-bottom:8px;
        }

        .btn{
            width:100%;
            padding:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="success-card">

    <i class="bi bi-check-circle-fill icon"></i>

    <h2>Payment Successful</h2>

    <p class="text-muted">

        Thank you for shopping with UrbanWear.

    </p>

    <div class="info-box">

        <p>

            <strong>Order ID :</strong>

            <span id="orderId"></span>

        </p>

        <p>

            <strong>Payment ID :</strong>

            <span id="paymentId"></span>

        </p>

    </div>

    <a href="home.html" class="btn btn-success">

        Continue Shopping

    </a>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("orderId").innerText =
params.get("order_id") || "-";

document.getElementById("paymentId").innerText =
params.get("payment_id") || "-";

</script>

</body>

</html>
