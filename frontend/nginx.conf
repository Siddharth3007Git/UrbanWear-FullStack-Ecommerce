server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
