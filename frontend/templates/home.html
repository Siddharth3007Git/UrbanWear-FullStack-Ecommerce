<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanWear | Home</title>

    <link rel="stylesheet" href="/static/css/home.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">
        <a href="/home" class="logo">UrbanWear.</a>

        <div class="nav-links">
            <a href="/products">Products</a>
            <a href="/cart">Cart</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="hero-content">

            <p class="hero-eyebrow">
                New Collection 2026
            </p>

            <h1>
                Dress Better.<br>
                Live Better.
            </h1>

            <p class="hero-sub">
                Discover premium fashion for Men, Women and Kids.
            </p>

            <a href="/products" class="btn-hero">
                SHOP NOW
            </a>

        </div>

    </section>

    <!-- ================= CATEGORY ================= -->

    <section class="categories">

        <h2>Shop by Category</h2>

        <div class="category-grid">

            <a href="/products?category=men" class="category-card">

                <div class="category-img men"></div>

                <p>Men</p>

            </a>

            <a href="/products?category=women" class="category-card">

                <div class="category-img women"></div>

                <p>Women</p>

            </a>

            <a href="/products?category=kids" class="category-card">

                <div class="category-img kids"></div>

                <p>Kids</p>

            </a>

        </div>

    </section>

    <!-- ================= FEATURED PRODUCTS ================= -->

    <section class="featured">

        <h2>Featured Products</h2>

        <div class="product-grid" id="featuredProducts">

        </div>

        <div class="view-all">

            <a href="/products" class="btn-outline">

                VIEW ALL PRODUCTS

            </a>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="footer">

        <p>

            © 2026 UrbanWear. All Rights Reserved.

        </p>

    </footer>

    <script src="/static/js/home.js"></script>

</body>

</html>
