<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UrbanWear | Product Details</title>

    <link rel="stylesheet" href="/static/css/product_details.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <a href="/home" class="logo">
            UrbanWear.
        </a>

        <div class="nav-links">

            <a href="/products-page">Products</a>

            <a href="/cart-page">Cart</a>

            <a href="/login-page" id="authLink">
                Login
            </a>

        </div>

    </nav>

    <!-- ================= PRODUCT DETAILS ================= -->

    <section class="product-wrapper" id="productWrapper">

        <!-- Product Image -->

        <div class="product-image">

            <div class="image-placeholder">

                NO IMAGE AVAILABLE

            </div>

        </div>

        <!-- Product Information -->

        <div class="product-info">

            <p
                class="product-category"
                id="productCategory"
            ></p>

            <h1
                class="product-name"
                id="productName"
            ></h1>

            <p
                class="product-price"
                id="productPrice"
            ></p>

            <p
                class="product-stock"
                id="productStock"
            ></p>

            <!-- Quantity -->

            <div class="quantity-row">

                <label>

                    Quantity

                </label>

                <div class="quantity-box">

                    <button onclick="decreaseQty()">

                        −

                    </button>

                    <span id="qtyValue">

                        1

                    </span>

                    <button onclick="increaseQty()">

                        +

                    </button>

                </div>

            </div>

            <!-- Messages -->

            <div
                class="error-msg"
                id="errorMsg"
            ></div>

            <div
                class="success-msg"
                id="successMsg"
            ></div>

            <!-- Buttons -->

            <button
                class="btn-addcart"
                id="addCartBtn"
                onclick="addToCart()"
            >

                ADD TO CART

            </button>

            <a
                href="/products-page"
                class="btn-back"
            >

                ← Back to Products

            </a>

        </div>

    </section>

    <!-- Loading -->

    <div
        class="loading"
        id="loadingMsg"
    >

        Loading Product...

    </div>

    <!-- ================= FOOTER ================= -->

    <footer class="footer">

        <p>

            © 2026 UrbanWear. All Rights Reserved.

        </p>

    </footer>

    <script src="/static/js/product_details.js"></script>

</body>

</html>
