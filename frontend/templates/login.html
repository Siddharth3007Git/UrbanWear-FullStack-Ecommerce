<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UrbanWear | Login</title>

    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <a href="/home" class="logo">
            UrbanWear.
        </a>

        <div class="nav-links">

            <a href="/products-page">Products</a>

            <a href="/register-page">Register</a>

        </div>

    </nav>

    <!-- ================= LOGIN ================= -->

    <section class="login-wrapper">

        <div class="login-box">

            <div class="login-header">

                <h1>Welcome Back</h1>

                <p>
                    Sign in to continue shopping with UrbanWear.
                </p>

            </div>

            <div id="errorMsg" class="error-msg"></div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    autocomplete="email"
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                >

            </div>

            <button
                class="btn-login"
                id="loginBtn"
                onclick="loginUser()"
            >
                SIGN IN
            </button>

            <div class="divider">

                <span>OR</span>

            </div>

            <p class="register-link">

                Don't have an account?

                <a href="/register-page">
                    Create Account
                </a>

            </p>

        </div>

    </section>

    <script src="/static/js/login.js"></script>

</body>

</html>
