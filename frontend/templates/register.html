<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UrbanWear | Register</title>

    <link rel="stylesheet" href="/static/css/register.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <a href="/home" class="logo">
            UrbanWear.
        </a>

        <div class="nav-links">

            <a href="/products-page">Products</a>

            <a href="/login-page">Login</a>

        </div>

    </nav>

    <!-- ================= REGISTER SECTION ================= -->

    <section class="register-wrapper">

        <div class="register-box">

            <div class="register-header">

                <h1>Create Your Account</h1>

                <p>

                    Join UrbanWear and discover premium fashion.

                </p>

            </div>

            <div
                id="errorMsg"
                class="error-msg"
            ></div>

            <div
                id="successMsg"
                class="success-msg"
            ></div>

            <div class="form-group">

                <label>

                    Full Name

                </label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    autocomplete="name"
                >

            </div>

            <div class="form-group">

                <label>

                    Email Address

                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    autocomplete="email"
                >

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a strong password"
                    autocomplete="new-password"
                >

            </div>

            <button
                id="registerBtn"
                class="btn-register"
                onclick="registerUser()"
            >

                CREATE ACCOUNT

            </button>

            <div class="divider">

                <span>OR</span>

            </div>

            <p class="login-link">

                Already have an account?

                <a href="/login-page">

                    Sign In

                </a>

            </p>

        </div>

    </section>

    <script src="/static/js/register.js"></script>

</body>

</html>
